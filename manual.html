<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AireGuard | Personal Safety</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-gold: #d4af37;
            --text-main: #ffffff;
            --text-dim: #888888;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Inter', sans-serif; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #disclaimer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden;
            transition: all 0.5s ease;
        }

        #disclaimer-overlay.show { opacity: 1; visibility: visible; }

        .modal-card {
            background: var(--glass-bg);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 40px 30px; border-radius: 20px;
            width: 85%; max-width: 400px; text-align: center;
        }

        .sync-btn {
            width: 180px; height: 180px; border-radius: 50%;
            background: transparent; border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
        }

        .sync-btn.active {
            border-color: #fff;
            color: #fff;
        }
    </style>
</head>

<body>

<div id="disclaimer-overlay">
    <div class="modal-card">
        <button onclick="closeDisclaimer()">×</button>
        <h2>AireGuard Integrity</h2>
        <p>Microphone required for safety detection.</p>
        <button onclick="closeDisclaimer()">Understood</button>
    </div>
</div>

<div class="container">
    <button class="sync-btn" id="mainBtn" onclick="initializeAireGuard()">
        <span id="btnText">OFF</span>
    </button>
</div>

<script>
window.onload = () => {
    setTimeout(() => {
        document.getElementById('disclaimer-overlay').classList.add('show');
    }, 800);
};

function closeDisclaimer() {
    document.getElementById('disclaimer-overlay').classList.remove('show');
}

/* =========================
   GLOBAL STATE (IMPORTANT)
========================= */
let recognition;
let audioStream;
let mediaRecorder;
let recordingActive = false;
let keywordTriggered = false;
let transcriptBuffer = "";

/* =========================
   INITIALIZE
========================= */
async function initializeAireGuard() {

    document.getElementById('btnText').innerText = "Active";
    document.getElementById('mainBtn').classList.add('active');

    startSpeechEngine();
}

/* =========================
   FIXED SPEECH ENGINE
========================= */
function startSpeechEngine() {

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        console.error("SpeechRecognition not supported");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true; // IMPORTANT FIX
    recognition.lang = "en-US";

    recognition.onresult = (event) => {

        let interim = "";
        let finalText = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
            const text = event.results[i][0].transcript.toLowerCase();

            if (event.results[i].isFinal) {
                finalText += text + " ";
            } else {
                interim += text + " ";
            }
        }

        transcriptBuffer = (transcriptBuffer + " " + finalText + interim).toLowerCase();

        // CLEAN BUFFER (prevents memory + lag)
        if (transcriptBuffer.length > 2000) {
            transcriptBuffer = transcriptBuffer.slice(-1000);
        }

        // =========================
        // KEYWORD DETECTION FIXED
        // =========================
        if (
            !keywordTriggered &&
            transcriptBuffer.includes("james")
        ) {
            keywordTriggered = true;
            triggerEmergencyFlow();
        }
    };

    recognition.onerror = () => {
        // silent recovery
    };

    recognition.onend = () => {
        // HARD RESTART LOOP (critical fix)
        setTimeout(() => {
            try { recognition.start(); } catch (e) {}
        }, 250);
    };

    recognition.start();

    // watchdog restart (extra stability layer)
    setInterval(() => {
        try {
            recognition.start();
        } catch (e) {}
    }, 4000);
}

/* =========================
   EMERGENCY FLOW
========================= */
function triggerEmergencyFlow() {

    if (recordingActive) return;

    recordingActive = true;

    sendPing();
    startRecordingLoop();

    setTimeout(() => {
        window.location.href = "tel:10111";
    }, 1200);
}

/* =========================
   RECORDING LOOP (60s)
========================= */
async function startRecordingLoop() {

    try {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        const loop = () => {

            mediaRecorder = new MediaRecorder(audioStream);
            let chunks = [];

            mediaRecorder.ondataavailable = e => chunks.push(e.data);

            mediaRecorder.onstop = () => {

                const blob = new Blob(chunks, { type: "audio/webm" });
                const url = URL.createObjectURL(blob);

                const a = document.createElement("a");
                a.href = url;
                a.download = `aireguard_${Date.now()}.webm`;
                a.click();

                URL.revokeObjectURL(url);

                if (recordingActive) {
                    setTimeout(loop, 1000);
                }
            };

            mediaRecorder.start();

            setTimeout(() => {
                mediaRecorder.stop();
            }, 60000);
        };

        loop();

    } catch (err) {
        console.error("Mic error:", err);
    }
}

/* =========================
   PING
========================= */
function sendPing() {
    fetch("https://airstore780-svg.github.io/aireguard/ping.php")
        .catch(() => {});
}
</script>

</body>
</html>
