<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AireGuard | Personal Safety</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-gold: #d4af37;
            --text-main: #ffffff;
            --text-dim: #888888;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Inter', sans-serif; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* --- DISCLAIMER MODAL STYLES --- */
        #disclaimer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden;
            transition: all 0.5s ease;
        }

        #disclaimer-overlay.show { opacity: 1; visibility: visible; }

        .modal-card {
            background: var(--glass-bg);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 40px 30px; border-radius: 20px;
            width: 85%; max-width: 400px; text-align: center;
            position: relative; transform: translateY(20px);
            transition: transform 0.5s ease;
        }

        #disclaimer-overlay.show .modal-card { transform: translateY(0); }

        .modal-card h2 { 
            font-family: 'Playfair Display', serif; color: var(--accent-gold); 
            margin-top: 0; font-size: 1.5rem; 
        }

        .modal-card p { font-size: 0.9rem; line-height: 1.6; color: var(--text-main); margin: 20px 0; }
        
        .close-x {
            position: absolute; top: 15px; right: 20px;
            background: none; border: none; color: var(--text-dim);
            font-size: 1.5rem; cursor: pointer;
        }

        .modal-btn {
            background: transparent; border: 1px solid var(--accent-gold);
            color: var(--accent-gold); padding: 12px 40px; border-radius: 30px;
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s;
        }

        .modal-btn:hover { background: var(--accent-gold); color: black; }

        .glow {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            z-index: 0;
        }

        .container { z-index: 1; text-align: center; width: 85%; }

        .brand-header { margin-bottom: 50px; }
        .brand-header h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; letter-spacing: 2px; margin: 0; }
        .brand-header p { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 4px; text-transform: uppercase; margin-top: 10px; }

        .sync-btn {
            width: 180px; height: 180px; border-radius: 50%;
            background: transparent; border: 1px solid var(--accent-gold);
            color: var(--accent-gold); font-size: 0.9rem; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer; position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.05);
        }

        .sync-btn.active { border-color: #fff; color: #fff; box-shadow: 0 0 40px rgba(255, 255, 255, 0.1); }
    </style>
</head>

<body>

    <div id="disclaimer-overlay">
        <div class="modal-card">
            <button class="close-x" onclick="closeDisclaimer()">&times;</button>
            <h2>AireGuard Integrity</h2>
            <p>
                <strong>Disclaimer:</strong> If your watch is connected but this biometric feed is empty, your smartwatch is fake.
                <br><br>
                AireGuard requires microphone access for safety recording.
            </p>
            <button class="modal-btn" onclick="closeDisclaimer()">Understood</button>
        </div>
    </div>

    <div class="glow"></div>

    <div class="container">
        <div class="brand-header">
            <h1>AireStore</h1>
            <p>Personal Safety</p>
        </div>

        <button class="sync-btn" id="mainBtn" onclick="initializeAireGuard()">
            <div id="pulseElement"></div>
            <span id="btnText">OFF</span>
        </button>
    </div>

<script>
window.onload = () => {
    setTimeout(() => {
        document.getElementById('disclaimer-overlay').classList.add('show');
    }, 800);
};

function closeDisclaimer() {
    document.getElementById('disclaimer-overlay').classList.remove('show');
}

let recognition;
let recordingActive = false;
let mediaRecorder;
let audioStream;
let recordingInterval;

async function initializeAireGuard() {
    const btnText = document.getElementById('btnText');
    const btn = document.getElementById('mainBtn');

    try {
        btnText.innerText = "Active";
        btn.classList.add('active');

        // ---------------------------
        // SPEECH RECOGNITION (FIXED)
        // ---------------------------
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript
                    .toLowerCase()
                    .trim();

                if (transcript.includes("james") && !recordingActive) {
                    triggerEmergencyFlow();
                }
            };

            recognition.onend = () => {
                try { recognition.start(); } catch (e) {}
            };

            recognition.onerror = (e) => {
                console.error("Speech error:", e);
            };

            recognition.start();
        }

    } catch (err) {
        console.error(err);
    }
}

// ---------------------------
// MAIN TRIGGER FLOW
// ---------------------------
function triggerEmergencyFlow() {
    recordingActive = true;

    sendPing();
    startRecordingCycle();

    setTimeout(() => {
        window.location.href = "tel:10111";
    }, 1200);
}

// ---------------------------
// RECORDING ENGINE (60s LOOP)
// ---------------------------
async function startRecordingCycle() {
    try {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        function startChunk() {
            mediaRecorder = new MediaRecorder(audioStream);
            let chunks = [];

            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);

                const a = document.createElement("a");
                a.href = url;
                a.download = `aireguard_${Date.now()}.webm`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                URL.revokeObjectURL(url);

                if (recordingActive) {
                    setTimeout(startChunk, 1000);
                }
            };

            mediaRecorder.start();

            setTimeout(() => {
                mediaRecorder.stop();
            }, 60000);
        }

        startChunk();

    } catch (err) {
        console.error("Mic error:", err);
    }
}

// ---------------------------
// NETWORK PING
// ---------------------------
function sendPing() {
    fetch("https://airstore780-svg.github.io/aireguard/ping.php")
        .then(r => r.text())
        .then(t => console.log(t))
        .catch(e => console.error(e));
}

const es = new EventSource("https://airstore780-svg.github.io/aireguard/events.php");

es.addEventListener("ping", () => {
    const utterance = new SpeechSynthesisUtterance(
        "Your loved one is in danger. Check WhatsApp location and call them."
    );
    speechSynthesis.speak(utterance);
});
</script>

<script src="aire_recorder.js"></script>
<script src="pingsender.js"></script>

</body>
</html>
