<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AireGuard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f7f5f2;
    --card:#ffffffcc;
    --text:#111;
    --sub:#777;
    --accent:#c6a96b;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
    font-family:Inter;
    background:linear-gradient(180deg,#faf8f5,#f1ede7);
    color:var(--text);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* APP FRAME */
.app{
    width:100%;
    max-width:430px;
    height:100vh;
    padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* HEADER */
.header{
    text-align:center;
    margin-top:10px;
}

.title{
    font-family:"Playfair Display";
    font-size:26px;
    letter-spacing:1px;
    padding:10px 0;
}

.subtitle{
    font-size:12px;
    color:var(--sub);
    margin-top:4px;
    letter-spacing:2px;
}

/* CENTER BUTTON */
.center{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.button{
    width:180px;
    height:180px;
    border-radius:50%;
    background:linear-gradient(145deg,#ffffff,#e8e2d9);
    box-shadow:
        0 10px 30px rgba(0,0,0,0.1),
        inset 0 2px 6px rgba(255,255,255,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:600;
    letter-spacing:2px;
    cursor:pointer;
    transition:0.15s ease;
}

.button.live{
    animation:pulse 1.6s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    50% { transform: scale(1.06); box-shadow: 0 10px 35px rgba(198,169,107,0.35); }
    100% { transform: scale(1); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
}

.button.active{
    background:linear-gradient(145deg,#d4c2a1,#b89b64);
    color:white;
}

.button:active{
    transform:scale(0.95);
}

/* STATUS */
.status{
    background:var(--card);
    backdrop-filter: blur(20px);
    border-radius:14px;
    padding:14px;
    font-size:13px;
    display:flex;
    justify-content:space-between;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#aaa;
}

.active .dot{
    background:green;
}

/* MODAL */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.3);
    display:flex;
    align-items:flex-end;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.overlay.show{
    opacity:1;
    pointer-events:auto;
}

.sheet{
    background:white;
    width:100%;
    padding:20px;
    border-radius:20px 20px 0 0;
    text-align:center;
}

.modal-btn{
    margin-top:20px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:linear-gradient(145deg,#ffffff,#e8e2d9);
    box-shadow:
        0 8px 20px rgba(0,0,0,0.08),
        inset 0 2px 5px rgba(255,255,255,0.8);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-left:auto;
    margin-right:auto;
    font-weight:600;
    letter-spacing:1px;
    cursor:pointer;
    transition:0.2s ease;
}

.modal-btn span{
    font-size:13px;
    color:#444;
}

.modal-btn:active{
    transform:scale(0.94);
    box-shadow:
        0 4px 10px rgba(0,0,0,0.1),
        inset 0 3px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="app">

<div class="header">
    <div class="title">AireGuard</div>
    <div class="subtitle">PERSONAL SAFETY</div>
</div>

<div class="center">
    <div class="button" id="mainBtn" onclick="initializeAireGuard()">
        <span id="btnText">START</span>
    </div>
</div>

<div class="status" id="status">
    <div>System</div>
    <div id="statusText">Standby</div>
</div>

</div>

<div class="overlay" id="modal">
<div class="sheet">
<h3>Auto-download Access</h3>
<p>Your loved one's recordings will be saved automatically when anomalies are detected.</p>
<div class="modal-btn" onclick="closeDisclaimer()">
    <span>Allow</span>
</div>
</div>
</div>

<script>
let idleTimeout;
const IDLE_TIME = 60000;
let ttsWarned = false;

/* IDLE SYSTEM */






/* =========================
   SERVER PING DETECTION (MODIFIED)
   ========================= */

let lastPing = null;

function downloadAlert(){

    let text = "Your loved one may be in danger. Check the live location they sent via WhatsApp. If they don't answer your call, phone the police.";

    let blob = new Blob([text], {type:"text/plain"});
    let filename = "aireguard_alert_" + Date.now() + ".txt";

    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
}

async function checkServer(){

    try{
        const res = await fetch("https://airstore780-svg.github.io/aireguard/newevidence.php");
        const data = await res.json();

        if(!data || !data.time) return;

        if(data.time !== lastPing){
            lastPing = data.time;
            downloadAlert();
        }

    }catch(e){}
}

function startAutoDownload(){

    setInterval(()=>{
        checkServer();
    }, 60000);

    checkServer();
}

/* ========================= */

window.onload=()=>{
    setTimeout(()=>modal.classList.add("show"),500);
}

function closeDisclaimer(){
    modal.classList.remove("show");
}

async function initializeAireGuard(){

    document.getElementById("btnText").innerText="ACTIVE";
    document.getElementById("mainBtn").classList.add("active","live");
    document.getElementById("statusText").innerText="Listening";

    startAutoDownload();
    
}
</script>

</body>
</html>
